name: Build Android
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        game: [wordeazy, matheazy]
    defaults:
      run:
        working-directory: WOWDOM_REPO_SLIM/${{ matrix.game }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - run: npm ci
      - run: npx cap add android && npx cap sync android
      - name: Build APK and AAB
        working-directory: WOWDOM_REPO_SLIM/${{ matrix.game }}/android
        run: chmod +x gradlew && ./gradlew assembleDebug bundleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.game }}-android
          path: WOWDOM_REPO_SLIM/${{ matrix.game }}/android/app/build/outputs/**/*.a*
